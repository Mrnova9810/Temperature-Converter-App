<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="styleSheet" href="style.css"> 
</head>
<body>

    <div class="card"> 
        <h2> Temperature Converter </h2>

        <div class="content">
            <div class="row">
            <p class="units"> Celsius:  </p>
            <textarea class ="textarea"  id="celsius" inputmode="numeric"  placeholder="Enter temprature"></textarea>
            </div>


            <div class="row">
            <p class="units">Fahrenheit:</p>
            <textarea class="textarea"  id="fahrenheit" inputmode="numeric"  placeholder="Enter temprature"></textarea>
            </div>

            <div class="row">
            <p  class="units">Kelvin:</p>
            <textarea class="textarea" id="kelvin" inputmode="numeric"  placeholder="Enter temprature"></textarea>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
